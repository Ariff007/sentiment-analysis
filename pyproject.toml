[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
addopts = "-v --tb=short --color=yes"
filterwarnings = [
    # vaderSentiment uses codecs.open() which is deprecated in Python 3.14
    # This is a third-party issue outside our control
    "ignore::DeprecationWarning:vaderSentiment",
    "ignore::DeprecationWarning:codecs",
]

[tool.black]
line-length = 99
target-version = ["py39", "py310", "py311"]
include = '\.pyi?$'

[tool.isort]
profile = "black"
line_length = 99
known_first_party = ["src"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.coverage.run]
source = ["src"]
omit = ["tests/*", "setup.py"]

[tool.coverage.report]
fail_under = 70
show_missing = true
